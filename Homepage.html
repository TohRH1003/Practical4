<!DOCTYPE html>
<html>
<head>
  <title>SCC Class</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#4facfe,#00f2fe);
      height:100vh;
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      width:350px;
    }

    h1{
      margin-bottom:15px;
      color:#333;
    }

    p{
      color:green;
      font-size:18px;
      margin-bottom:25px;
    }

    a{
      text-decoration:none;
      background:#4facfe;
      color:white;
      padding:12px 20px;
      border-radius:8px;
      font-weight:bold;
      transition:0.3s;
      display:inline-block;
    }

    a:hover{
      background:#2c8ef5;
      transform:scale(1.05);
    }

  </style>
</head>

<body>

  <div class="card">
    <h1>SCC Class</h1>
    <p>I have PhD</p>

    <p>P = Process of</p>
     <p>h = hair</p>
     <p>D = Disappearing</p>
    </a>
  </div>

</body>
</html>
